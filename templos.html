<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"

    <meta name="author" content="Miguel Enrique Fernandez Rodriguez">
    <title>Album do Templo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="estilos/templos.css">
    <link rel="stylesheet" href="estilos/templos-grandes.css">
    <script src="scripts/templos.js" defer></script>
</head>

<body>
    <header>
        <p class="header-title">Álbum do Templo</p>
        <button id="menu-toggle" aria-label="Abrir menu">☰</button>
        <nav id="nav-menu">
            <ul>
                <li><a href="#">Página Inicial</a></li>
                <li><a href="#">Antigo</a></li>
                <li><a href="#">Novo</a></li>

    <main>
        <h1>Pagina Inicial</h1>

        <figure>
            <img src="imagens/templo_salt_lake4.jpg" alt="Templo de Salt Lake, Utah" width="200">
            <figcaption>Templo de Salt Lake (EUA)</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_roma.jpg" alt="Templo de Roma, Italia" width="200">
            <figcaption>Templo de Roma (Itália)</figcaption>
        </figure>

        <figure>
            <img src="imagens/templo_tokio2.jpg" alt="Templo de Toquio, Japão" width="200">
            <figcaption>Templo de Tóquio (Japão)</figcaption>
        </figure>

        <figure>
            <img src="imagens/caracas_venezuela_temple1.jpg" alt="Templo de Caracas, Venezuela" width="200">

        </figure>

        <figure>
            <img src="imagens/templo_san_diego.jpg" alt="Templo de San Diego, USA" width="200">

        <figure>
            <img src="imagens/templo_frankfurt.jpg" alt="Templo de Frankfurt, Alemanha" width="200">

        <figure>

        </figure>

        <figure>
            <img src="imagens/templo_paris.jpg" alt="Templo de Paris, França" width="200">

        </figure>

        <figure>
            <img src="imagens/templo_sao_paulo.jpg" alt="Templo de São Paulo, Brasil" width="200">
            <figcaption>Templo de São Paulo (Brasil)</figcaption>
        </figure>
    </main>

    <footer>
        <p>&copy; <span id="anoAtual"></span> Miguel Enrique Fernandez Rodriguez - Paraná, Brasil</p>
